<!DOCTYPE html>
<html>
<head>
    <title>Code Typing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="app">

    <div class="sidebar">
        <h3>Languages</h3>
        <button onclick="setLanguage('js', event)" class="active-btn">JavaScript</button>
        <button onclick="setLanguage('c', event)">C</button>
        <button onclick="setLanguage('cpp', event)">C++</button>
    </div>

    <div class="main">

        <div class="topbar">
            <button id="themeBtn">🌙 DARK</button>
        </div>

        <div id="stats">
            <span id="wpm">0</span> wpm &nbsp;
            <span id="raw">0</span> raw &nbsp;
            <span id="acc">100%</span> acc
        </div>

        <div id="code"></div>

        <div id="result" class="hidden"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
